<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清明上河图密码 — 小黑盒幻想家</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
@font-face { font-family: 'Zpix'; src: url('../../../zpix-subset.woff2') format('woff2'); font-display: swap; }
:root {
  --dark: #020315; --light: #E2F0FF; --accent: #a281ff; --accent2: #4a2080;
  --ease: cubic-bezier(.16,1,.3,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
div { display:flex; }
body { background:var(--dark); color:var(--light); font-family:'DM Sans',-apple-system,'Microsoft YaHei',sans-serif; overflow-x:hidden; min-height:100vh; }
::-webkit-scrollbar { display:none; }

/* SCROLL BAR */
.scroll_bar { position:fixed; left:0; top:0; width:.3rem; height:0; background:linear-gradient(180deg,#a281ff,#4a2080); z-index:9999; transition:none; }

/* NAV */
nav { position:fixed; top:1.5rem; left:0; right:0; padding:0 3rem; justify-content:space-between; align-items:center; z-index:100; mix-blend-mode:difference; }
.nav_back { font-family:'Zpix',monospace; font-size:.85rem; color:var(--light); text-decoration:none; letter-spacing:.1rem; transition:color .3s,letter-spacing .3s; }
.nav_back:hover { color:var(--accent); letter-spacing:.2rem; }
.nav_brand { font-family:'Zpix',monospace; font-size:.8rem; color:var(--light); text-decoration:none; letter-spacing:.1rem; opacity:.6; }

/* HERO */
.hero { position:relative; width:100%; height:100svh; min-height:500px; flex-direction:column; justify-content:flex-end; padding:6rem 5% 4rem; overflow:hidden; }
.hero_bg { position:absolute; inset:0; background:linear-gradient(180deg,rgba(2,3,21,0) 40%,var(--dark) 100%); z-index:1; pointer-events:none; }
.hero_img { position:absolute; inset:0; }
.hero_img img { width:100%; height:100%; object-fit:cover; filter:brightness(.45) saturate(.8); }
.hero_content { position:relative; z-index:2; flex-direction:column; gap:.8rem; }
.hero_tag { font-family:'DM Mono',monospace; font-size:.65rem; color:var(--accent); letter-spacing:.3rem; text-transform:uppercase; opacity:.8; }
.hero_title { font-family:'Zpix','Press Start 2P',monospace; font-size:clamp(2.5rem,5vw,5rem); color:var(--light); letter-spacing:.2rem; line-height:1.15; }
.hero_sub { font-size:1rem; color:rgba(226,240,255,.6); letter-spacing:.2rem; }
.hero_scroll { position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); z-index:2; flex-direction:column; align-items:center; gap:.6rem; opacity:.3; }
.hero_scroll p { font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.15rem; }
.hero_scroll_line { width:.05rem; height:2.5rem; background:var(--light); animation:scrollPulse 2s ease infinite; }
@keyframes scrollPulse { 0%,100%{transform:scaleY(1);opacity:.3} 50%{transform:scaleY(.4);opacity:.8} }

/* GALLERY */
.gallery { width:90%; max-width:80rem; flex-direction:column; gap:.8rem; margin:4rem auto; padding-bottom:6rem; }
.g_row { width:100%; gap:.8rem; flex-wrap:wrap; }
.g_item { position:relative; overflow:hidden; border-radius:.4rem; cursor:pointer; background:rgba(226,240,255,.04); border:1px solid rgba(226,240,255,.06); transition:border-color .3s; }
.g_item:hover { border-color:rgba(162,129,255,.3); }
.g_item img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .6s var(--ease),filter .4s; filter:saturate(.85); }
.g_item:hover img { transform:scale(1.04); filter:saturate(1); }
.g_full { width:100%; aspect-ratio:16/6; }
.g_half { width:calc(50% - .4rem); aspect-ratio:4/3; }
.g_third { width:calc(33.333% - .55rem); aspect-ratio:3/4; }
.g_wide { width:60%; aspect-ratio:3/2; }
.g_narrow { width:calc(40% - .8rem); aspect-ratio:3/4; }

/* LIGHTBOX */
.lb { position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:9998; flex-direction:column; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:opacity .3s; cursor:pointer; }
.lb.open { opacity:1; pointer-events:all; }
.lb img { max-width:92vw; max-height:88vh; object-fit:contain; border-radius:.3rem; }
.lb_close { position:absolute; top:1.5rem; right:2rem; font-size:1.5rem; color:var(--light); opacity:.5; cursor:pointer; transition:opacity .3s; }
.lb_close:hover { opacity:1; }
.lb_nav { position:absolute; top:50%; transform:translateY(-50%); font-size:2.5rem; color:var(--light); opacity:.25; cursor:pointer; padding:1.5rem; transition:opacity .3s; z-index:10; }
.lb_nav:hover { opacity:.8; }
.lb_prev { left:0; }
.lb_next { right:0; }
.lb_info { position:absolute; bottom:1.5rem; font-family:'DM Mono',monospace; font-size:.65rem; color:var(--light); opacity:.3; letter-spacing:.1rem; }

/* FOOTER */
footer { width:100%; justify-content:center; align-items:center; padding:2rem; border-top:1px solid rgba(226,240,255,.06); }
footer a { font-family:'Zpix',monospace; font-size:.8rem; color:var(--light); text-decoration:none; letter-spacing:.15rem; border:1px solid rgba(226,240,255,.2); padding:.7rem 1.5rem; border-radius:.3rem; transition:border-color .3s,color .3s; }
footer a:hover { border-color:var(--accent); color:var(--accent); }

@media (max-width:768px) {
  nav { padding:0 1.2rem; top:1rem; }
  .hero { padding:4rem 4% 3rem; }
  .hero_title { font-size:clamp(1.8rem,7vw,3rem); }
  .gallery { width:96%; gap:.5rem; margin:2.5rem auto; }
  .g_row { gap:.5rem; }
  .g_half { width:100%; aspect-ratio:16/9; }
  .g_third { width:calc(50% - .25rem); aspect-ratio:1/1; }
  .g_wide { width:100%; aspect-ratio:16/9; }
  .g_narrow { width:100%; aspect-ratio:16/9; }
  .g_full { aspect-ratio:16/7; }
}

/* Image number labels */
.g_num {
  position: absolute;
  top: .6rem; left: .6rem;
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  font-weight: 500;
  color: rgba(226,240,255,.9);
  background: rgba(2,3,21,.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: .2rem .5rem;
  border-radius: .25rem;
  letter-spacing: .05em;
  z-index: 2;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s ease;
}
.g_item:hover .g_num { opacity: 1; }
/* Always visible on touch devices */
@media (pointer: coarse) { .g_num { opacity: .7; } }

/* Preloader overlay */
.page_loader {
  position: fixed; inset: 0;
  background: var(--dark);
  z-index: 10000;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  transition: opacity .6s ease;
}
.page_loader.done { opacity: 0; pointer-events: none; }
.loader_spinner {
  width: 2.5rem; height: 2.5rem;
  border: 2px solid rgba(226,240,255,.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader_text {
  margin-top: 1rem;
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  color: rgba(226,240,255,.4);
  letter-spacing: .1em;
}
.loader_progress {
  margin-top: .6rem;
  width: 8rem; height: 2px;
  background: rgba(226,240,255,.08);
  border-radius: 2px;
  overflow: hidden;
}
.loader_bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width .3s ease;
  border-radius: 2px;
}

/* Lazy load placeholder */
.g_item[data-src] img {
  opacity: 0;
  transition: opacity .5s ease;
}
.g_item[data-src].loaded img {
  opacity: 1;
}
.g_item[data-src]::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(226,240,255,.03);
  z-index: 1;
}
.g_item[data-src].loaded::before { display: none; }
</style>
</head>
<body>

<div class="page_loader" id="pageLoader">
  <div class="loader_spinner"></div>
  <p class="loader_text">LOADING</p>
  <div class="loader_progress"><div class="loader_bar" id="loaderBar"></div></div>
</div>
<div class="scroll_bar" id="scrollBar"></div>

<nav>
  <a class="nav_back" href="../../../project.html#ui">← 2026设计合集</a>
  <a class="nav_brand" href="../../../index.html">小黑盒幻想家</a>
</nav>

<div class="hero">
  <div class="hero_img"><img src="001.png" alt="清明上河图密码" loading="eager"></div>
  <div class="hero_bg"></div>
  <div class="hero_content">
    <p class="hero_tag">Design Work · 古装悬疑</p>
    <h1 class="hero_title">《清明上河图密码》</h1>
    <p class="hero_sub">影视海报设计方案</p>
  </div>
  <div class="hero_scroll"><p>SCROLL</p><div class="hero_scroll_line"></div></div>
</div>

<div class="gallery" id="gallery">
  <div class="g_row"><div class="g_item g_full"><span class="g_num">#01 · 001.png</span><img src="001.png" alt="" loading="lazy"></div></div>
  <div class="g_row"><div class="g_item g_half"><span class="g_num">#02 · 002.jpg</span><img src="002.jpg" alt="" loading="lazy"></div><div class="g_item g_half"><span class="g_num">#03 · 003.jpg</span><img src="003.jpg" alt="" loading="lazy"></div></div>
  <div class="g_row"><div class="g_item g_third"><span class="g_num">#04 · 004.jpg</span><img src="004.jpg" alt="" loading="lazy"></div><div class="g_item g_third"><span class="g_num">#05 · 005.jpg</span><img src="005.jpg" alt="" loading="lazy"></div><div class="g_item g_third"><span class="g_num">#06 · 006.jpg</span><img src="006.jpg" alt="" loading="lazy"></div></div>
</div>

<footer>
  <a href="../../../project.html#ui">← 返回设计合集</a>
</footer>

<div class="lb" id="lb">
  <span class="lb_close" id="lbClose">✕</span>
  <span class="lb_nav lb_prev" id="lbPrev">‹</span>
  <img id="lbImg" src="" alt="">
  <span class="lb_nav lb_next" id="lbNext">›</span>
  <p class="lb_info" id="lbInfo"></p>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

// Scroll progress bar
window.addEventListener('scroll', function() {
  var p = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
  document.getElementById('scrollBar').style.height = p + '%';
}, {passive:true});

// Gallery entrance
document.querySelectorAll('.g_item').forEach(function(el, i) {
  gsap.fromTo(el, {opacity:0, y:30}, {
    opacity:1, y:0, duration:.8, ease:'power2.out',
    scrollTrigger: {trigger:el, start:'top 90%', once:true},
    delay: (i % 4) * .08
  });
});

// Lightbox
var imgs = Array.from(document.querySelectorAll('.g_item img')).map(function(el) {return el.src;});
var lb = document.getElementById('lb');
var lbImg = document.getElementById('lbImg');
var lbInfo = document.getElementById('lbInfo');
var cur = 0;
function openLb(i) {
  cur = i; lbImg.src = imgs[i];
  lbInfo.textContent = (i+1) + ' / ' + imgs.length;
  lb.classList.add('open'); document.body.style.overflow='hidden';
}
function closeLb() { lb.classList.remove('open'); document.body.style.overflow=''; }
document.querySelectorAll('.g_item').forEach(function(el,i) {
  el.addEventListener('click', function() {openLb(i);});
});
document.getElementById('lbClose').addEventListener('click', closeLb);
lb.addEventListener('click', function(e) { if(e.target===lb) closeLb(); });
document.getElementById('lbPrev').addEventListener('click', function(e) {
  e.stopPropagation(); openLb((cur-1+imgs.length)%imgs.length);
});
document.getElementById('lbNext').addEventListener('click', function(e) {
  e.stopPropagation(); openLb((cur+1)%imgs.length);
});
document.addEventListener('keydown', function(e) {
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowLeft') openLb((cur-1+imgs.length)%imgs.length);
  if(e.key==='ArrowRight') openLb((cur+1)%imgs.length);
});

// Preloader + lazy load for large images
(function() {
  var loader = document.getElementById('pageLoader');
  var bar = document.getElementById('loaderBar');
  var items = document.querySelectorAll('.g_item');
  var total = items.length;
  var loaded = 0;

  // Convert large images to lazy-load (>500KB or GIF)
  items.forEach(function(item) {
    var img = item.querySelector('img');
    if (!img) return;
    var src = img.getAttribute('src');
    // All images lazy load
    item.setAttribute('data-src', src);
    img.setAttribute('data-real-src', src);
    // Set a tiny placeholder
    img.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect fill="#0a0a1a" width="100%" height="100%"/></svg>');
  });

  // Hero image loads immediately
  var heroImg = document.querySelector('.hero_img img');
  if (heroImg) {
    var heroSrc = heroImg.getAttribute('src');
    var heroReal = new Image();
    heroReal.onload = function() {
      heroImg.src = heroSrc;
      checkReady();
    };
    heroReal.onerror = checkReady;
    heroReal.src = heroSrc;
  }

  function checkReady() {
    // Hide preloader after hero loads (or 3s max)
    if (bar) bar.style.width = '100%';
    setTimeout(function() {
      if (loader) loader.classList.add('done');
      setTimeout(function() { if (loader) loader.remove(); }, 600);
    }, 300);
    // Start lazy loading gallery images
    lazyLoadGallery();
  }

  // Fallback: hide after 4s no matter what
  setTimeout(checkReady, 4000);

  function lazyLoadGallery() {
    var lazyItems = document.querySelectorAll('.g_item[data-src]');
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var item = entry.target;
        var img = item.querySelector('img');
        var realSrc = img.getAttribute('data-real-src');
        if (!realSrc) return;
        var newImg = new Image();
        newImg.onload = function() {
          img.src = realSrc;
          item.classList.add('loaded');
          loaded++;
          if (bar) bar.style.width = (loaded / total * 100) + '%';
        };
        newImg.onerror = function() {
          item.classList.add('loaded');
          loaded++;
        };
        newImg.src = realSrc;
        io.unobserve(item);
      });
    }, { rootMargin: '200px 0px' });
    lazyItems.forEach(function(item) { io.observe(item); });
  }
})();
</script>
</body>
</html>
